# values-log-search.yaml
# Generic Helm values base — OpenSearch-backed log search on AWS EKS.
#
# This file contains only environment-agnostic config (env vars).
# Use alongside an environment-specific overlay that defines extraVolumes,
# extraVolumeMounts, and extraContainers for your cluster's PVC and subPath:
#
#   helm upgrade mageai ~/helm-charts/charts/mageai \
#     --namespace mage \
#     --values ~/helm-charts/examples/aws-eks/values-log-search.yaml \
#     --values ~/helm-charts/examples/aws-eks/values-log-search-staging.yaml \
#     --reuse-values
#
# Prerequisites (apply before helm install/upgrade):
#   kubectl -n mage create configmap fluent-bit-config \
#     --from-file=fluent-bit.conf=<path-to-mage-pro>/fluent-bit-prod.conf
#   kubectl -n mage create configmap fluent-bit-parsers \
#     --from-file=parsers.conf=<path-to-mage-pro>/fluent-bit-parsers.conf

# ── Environment variables injected into the mageai container ─────────────────
config:
  # Log data lives under /home/src (the PVC mount path).
  MAGE_DATA_DIR: /home/src/mage_data
  # In-cluster OpenSearch service DNS (adjust namespace if needed).
  OPENSEARCH_HOST: opensearch-cluster-master.mage-search.svc.cluster.local
  OPENSEARCH_PORT: "9200"
  # Enable OpenSearch as the primary log-loading source.
  # Without this flag LogResource falls back to reading from disk.
  USE_OPENSEARCH_FOR_LOGS: "true"
