{{- if .Values.standaloneScheduler }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.scheduler.name }}
  labels:
    {{- include "mageai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "mageai.schedulerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mageai.schedulerSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mageai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.redis.enabled .Values.redis.customRedisURL .Values.postgresql.enabled }}
      initContainers:
        {{- if or .Values.redis.enabled .Values.redis.customRedisURL }}
        - name: wait-for-redis
          image: {{ .Values.initContainerImages.alpine }}
          env:
          {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: redis://{{.Release.Name}}-redis-headless:6379/0
          {{- else if .Values.redis.customRedisURL }}
            - name: REDIS_URL
              value: {{ .Values.redis.customRedisURL }}
          {{- end }}
          command: ["sh", "-c", "until nc -z -v $(echo $REDIS_URL | cut -d'/' -f3 | cut -d':' -f1) $(echo $REDIS_URL | cut -d'/' -f3 | cut -d':' -f2); do sleep 1; done"]
        {{- end }}
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.initContainerImages.busybox }}
          command: ['sh', '-c', 'until nc -z {{ .Values.postgresql.fullnameOverride }} 5432; do echo waiting for postgres; sleep 2; done;']
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- if .Values.scheduler.resources }}
              {{- toYaml .Values.scheduler.resources | nindent 12 }}
            {{- else }}
              {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          envFrom:
            {{- if .Values.config }}
            - configMapRef:
                name: {{ include "mageai.fullname" . }}-env
            {{- end }}
            {{- if or (.Values.existingSecret) (.Values.secrets) }}
            - secretRef:
                name: {{ include "mageai.secretName" . }}
            {{- end }}
          env:
          {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
          {{- else if .Values.extraEnvs }}
            {{- toYaml .Values.extraEnvs | nindent 12 }}
          {{- end }}
          {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: redis://{{ .Release.Name }}-redis-headless:6379/0
          {{- else if .Values.redis.customRedisURL }}
            - name: REDIS_URL
              value: {{ .Values.redis.customRedisURL }}
          {{- end }}
          {{- if .Values.postgresql.enabled }}
            - name: MAGE_DATABASE_CONNECTION_URL
              value: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Values.postgresql.fullnameOverride }}:5432/{{ .Values.postgresql.auth.database }}
          {{- end }}
            - name: INSTANCE_TYPE
              value: scheduler
          {{- if and .Values.workspaceConfig .Values.workspaceConfig.enabled }}
            - name: WORKSPACE_DEFAULT_CONFIG_PATH
              value: /etc/mage/workspace-config.yaml
          {{- end }}
          {{- if and .Values.k8sExecutorConfig .Values.k8sExecutorConfig.enabled }}
            - name: K8S_DEFAULT_CONFIG_PATH
              value: /etc/mage/k8s-executor-config.yaml
          {{- end }}
          {{- if and .Values.logSearch .Values.logSearch.enabled }}
            - name: OPENSEARCH_HOST
              value: {{ include "mageai.opensearchHost" . | quote }}
            - name: OPENSEARCH_PORT
              value: {{ .Values.logSearch.opensearch.port | quote }}
            - name: USE_OPENSEARCH_FOR_LOGS
              value: "true"
            - name: OPENSEARCH_HTTP_SCHEME
              value: {{ if and .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled }}"https"{{ else }}"http"{{ end }}
            - name: OPENSEARCH_LOG_INDEX
              value: {{ .Values.logSearch.opensearch.index | default "mage_logs" | quote }}
            {{- if and .Values.logSearch.opensearch.auth .Values.logSearch.opensearch.auth.enabled .Values.logSearch.opensearch.auth.existingSecret }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logSearch.opensearch.auth.existingSecret }}
                  key: OPENSEARCH_USERNAME
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logSearch.opensearch.auth.existingSecret }}
                  key: OPENSEARCH_PASSWORD
            {{- end }}
          {{- end }}
          volumeMounts:
          {{- if .Values.volumes }}
            - name: mage-fs
              mountPath: /home/src
          {{- else if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
          {{- if and .Values.workspaceConfig .Values.workspaceConfig.enabled }}
            - name: workspace-config
              mountPath: /etc/mage/workspace-config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          {{- if and .Values.k8sExecutorConfig .Values.k8sExecutorConfig.enabled }}
            - name: k8s-executor-config
              mountPath: /etc/mage/k8s-executor-config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          {{- if and .Values.logSearch .Values.logSearch.enabled (or .Values.logSearch.persistence.existingClaim .Values.logSearch.persistence.enabled) .Values.logSearch.persistence.mountInMageContainer (not .Values.volumes) (not (include "mageai.logSearch.extraVolumeMountsContainMountPath" .)) }}
            - name: log-search-pvc
              mountPath: {{ .Values.logSearch.persistence.mountPath | default "/home/src" }}
              {{- if .Values.logSearch.persistence.subPath }}
              subPath: {{ .Values.logSearch.persistence.subPath }}
              {{- end }}
          {{- end }}
          {{- if and .Values.logSearch .Values.logSearch.enabled .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled .Values.logSearch.opensearch.tls.existingSecret }}
            - name: log-search-opensearch-ca
              mountPath: /etc/ssl/opensearch
              readOnly: true
          {{- end }}
        {{- if and .Values.logSearch .Values.logSearch.enabled .Values.logSearch.fluentBit.enabled (or .Values.volumes (include "mageai.logSearch.extraVolumeMountsContainMountPath" .) .Values.logSearch.persistence.existingClaim .Values.logSearch.persistence.enabled) }}
        - name: fluent-bit
          image: "{{ .Values.logSearch.fluentBit.image.repository }}:{{ .Values.logSearch.fluentBit.image.tag }}"
          imagePullPolicy: {{ .Values.logSearch.fluentBit.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          command:
            - /fluent-bit/bin/fluent-bit
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          env:
            - name: OPENSEARCH_HOST
              value: {{ include "mageai.opensearchHost" . | quote }}
            - name: OPENSEARCH_PORT
              value: {{ .Values.logSearch.opensearch.port | quote }}
            - name: OPENSEARCH_LOG_INDEX
              value: {{ .Values.logSearch.opensearch.index | default "mage_logs" | quote }}
            - name: OPENSEARCH_TLS
              value: {{ if and .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled }}"On"{{ else }}"Off"{{ end }}
            - name: OPENSEARCH_VERIFY_CERTS
              value: {{ if and .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled .Values.logSearch.opensearch.tls.verify }}"On"{{ else }}"Off"{{ end }}
            {{- if and .Values.logSearch.opensearch.auth .Values.logSearch.opensearch.auth.enabled .Values.logSearch.opensearch.auth.existingSecret }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logSearch.opensearch.auth.existingSecret }}
                  key: OPENSEARCH_USERNAME
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.logSearch.opensearch.auth.existingSecret }}
                  key: OPENSEARCH_PASSWORD
            {{- end }}
          volumeMounts:
            {{- if .Values.volumes }}
            - name: mage-fs
              mountPath: {{ .Values.logSearch.persistence.mountPath | default "/home/src" }}
              readOnly: true
            {{- else if include "mageai.logSearch.extraVolumeMountsContainMountPath" . }}
            {{- $mountPath := .Values.logSearch.persistence.mountPath | default "/home/src" }}
            {{- range .Values.extraVolumeMounts }}
            {{- if eq .mountPath $mountPath }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- else }}
            - name: log-search-pvc
              mountPath: {{ .Values.logSearch.persistence.mountPath | default "/home/src" }}
              readOnly: true
              {{- if .Values.logSearch.persistence.subPath }}
              subPath: {{ .Values.logSearch.persistence.subPath }}
              {{- end }}
            {{- end }}
            - name: log-search-fluent-bit-config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: log-search-fluent-bit-parsers
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
            - name: log-search-fluent-bit-state
              mountPath: /var/lib/fluent-bit
            {{- if and .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled .Values.logSearch.opensearch.tls.existingSecret }}
            - name: log-search-opensearch-ca
              mountPath: /etc/ssl/opensearch
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.logSearch.fluentBit.resources | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
      {{- else if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}
      {{- if and .Values.workspaceConfig .Values.workspaceConfig.enabled }}
        - name: workspace-config
          configMap:
            name: {{ include "mageai.fullname" . }}-workspace-config
      {{- end }}
      {{- if and .Values.k8sExecutorConfig .Values.k8sExecutorConfig.enabled }}
        - name: k8s-executor-config
          configMap:
            name: {{ include "mageai.fullname" . }}-k8s-executor-config
      {{- end }}
      {{- if and .Values.logSearch .Values.logSearch.enabled }}
        {{- if or .Values.logSearch.persistence.existingClaim .Values.logSearch.persistence.enabled }}
        - name: log-search-pvc
          persistentVolumeClaim:
            claimName: {{ include "mageai.logSearch.persistenceClaimName" . }}
        {{- end }}
        {{- if and .Values.logSearch.fluentBit.enabled (or .Values.volumes (include "mageai.logSearch.extraVolumeMountsContainMountPath" .) .Values.logSearch.persistence.existingClaim .Values.logSearch.persistence.enabled) }}
        - name: log-search-fluent-bit-config
          configMap:
            name: {{ include "mageai.logSearch.fluentBitConfigMap" . }}
        - name: log-search-fluent-bit-parsers
          configMap:
            name: {{ include "mageai.logSearch.fluentBitParsersConfigMap" . }}
        - name: log-search-fluent-bit-state
          emptyDir: {}
        {{- if and .Values.logSearch.opensearch.tls .Values.logSearch.opensearch.tls.enabled .Values.logSearch.opensearch.tls.existingSecret }}
        - name: log-search-opensearch-ca
          secret:
            secretName: {{ .Values.logSearch.opensearch.tls.existingSecret }}
        {{- end }}
        {{- end }}
      {{- end }}
{{- end }}
