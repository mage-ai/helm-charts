# Default values for mageai.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# ------------------------------------------------------------------------------
# Deployment topology
# ------------------------------------------------------------------------------

# Number of Mage replicas to run (when standaloneScheduler is false)
replicaCount: 1

# When true, splits Mage into separate web server and scheduler deployments for scaling
standaloneScheduler: false

# Scheduler deployment settings (only used when standaloneScheduler is true)
scheduler:
  replicaCount: 1
  name: mageai-scheduler
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  # hpa:
  #   minReplicas: 1
  #   maxReplicas: 10
  #   targetCPUUtilizationPercentage: 50

# Web server deployment settings (only used when standaloneScheduler is true)
webServer:
  replicaCount: 1
  name: mageai-webserver
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  # hpa:
  #   minReplicas: 1
  #   maxReplicas: 10
  #   targetCPUUtilizationPercentage: 50

# ------------------------------------------------------------------------------
# Dependencies
# ------------------------------------------------------------------------------

# PostgreSQL database for Mage metadata and pipeline state
postgresql:
  enabled: false
  fullnameOverride: "postgresql-service"
  auth:
    username: your_username
    password: your_password
    database: your_database
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.3.0-debian-12-r19
    pullPolicy: IfNotPresent

# OpenSearch for log search — optional bundled deployment.
# opensearch.enabled=true : installs OpenSearch together with the Mage chart
#                           (quick-start / staging). Host is auto-derived.
# opensearch.enabled=false: use an external / managed OpenSearch cluster and
#                           set logSearch.opensearch.host explicitly.
opensearch:
  enabled: false
  singleNode: true
  replicas: 1
  opensearchJavaOpts: "-Xms512m -Xmx512m"
  # REQUIRED: override at deploy time with a strong password.
  # --set opensearch.extraEnvs[0].value=<your-password>
  # Do not commit a real password here.
  extraEnvs:
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      value: ""
  config:
    opensearch.yml: |
      cluster.name: mage-logs
      network.host: 0.0.0.0
      plugins.security.disabled: true
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1536Mi
  persistence:
    # Set explicitly for bundled OpenSearch when your cluster has multiple
    # storage classes, e.g. gp2 or gp3 on EKS.
    storageClass: ""
    size: 10Gi

# Redis for distributed locking and caching (required for multiple replicas)
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  # Your custom redis url (make sure redis.enabled is set to false)
  customRedisURL: ""
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.1-debian-11-r0
    pullPolicy: IfNotPresent

image:
  # The main Mage container image repository.
  # Change this if you want to pull from a private registry.
  repository: mageai/mageai
  # Image pull policy for the main container.
  # Valid values: Always, IfNotPresent, Never
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# List of imagePullSecrets to use for pulling images from private registries.
# These must already exist in the target namespace.
# Example:
# imagePullSecrets:
#   - name: my-private-registry-secret
imagePullSecrets: []

# Lightweight images for init containers (Redis/PostgreSQL readiness checks)
initContainerImages:
  # Image used in initContainers for Redis readiness check.
  # Default is public Docker Hub Alpine image.
  alpine: alpine
  # Image used in initContainers for PostgreSQL readiness check.
  # Default is public Docker Hub BusyBox image.
  busybox: busybox

# ------------------------------------------------------------------------------
# Naming and RBAC
# ------------------------------------------------------------------------------

# Override the chart name in resource names
nameOverride: "mageai"
# Override the full name of resources (takes precedence over nameOverride)
fullnameOverride: "mageai"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "mageai"

# Annotations to add to the Deployment
deploymentAnnotations: {}

# Annotations to add to pods
podAnnotations: {}

# Labels to add to pods
podLabels: {}

# Security context for the pod
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# ------------------------------------------------------------------------------
# Service and networking
# ------------------------------------------------------------------------------

service:
  type: LoadBalancer
  port: 6789
  # Annotations to add to the service (e.g., for cloud load balancers)
  annotations: {}

# ------------------------------------------------------------------------------
# Health checks
# ------------------------------------------------------------------------------

# Liveness probe configuration
livenessProbe:
  enabled: true
  path: /api/status
  port: http
  initialDelaySeconds: 5
  # failureThreshold:
  # periodSeconds:
  # successThreshold:
  # terminationGracePeriodSeconds:
  timeoutSeconds: 10

# Readiness probe configuration
readinessProbe:
  enabled: true
  path: /api/status
  port: http
  initialDelaySeconds: 5
  # failureThreshold:
  # periodSeconds:
  # successThreshold:
  # terminationGracePeriodSeconds:
  timeoutSeconds: 1

# Override with a fully custom liveness probe (replaces default when set)
customLivenessProbe: {}

# Override with a fully custom readiness probe (replaces default when set)
customReadinessProbe: {}

# Horizontal Pod Autoscaler for the main deployment
# hpa:
#   minReplicas: 1
#   maxReplicas: 10
#   targetCPUUtilizationPercentage: 50

# Ingress for external access
# We recommend creating the ingress separately instead of creating it using this chart.
# There is a corresponding Mage-Ingress chart to create an ingress for Mage if needed.
# This section is kept here for backwards compatibility.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Schedule pods only on nodes with these labels
nodeSelector: {}

# Allow pods to be scheduled on tainted nodes
tolerations: []

# Pod affinity/anti-affinity rules
affinity: {}

# ------------------------------------------------------------------------------
# Storage and volumes
# ------------------------------------------------------------------------------

# Additional volume mounts for the Mage container
extraVolumeMounts:
  - name: mage-fs
    mountPath: /home/src

# Additional volumes (must include mage-fs for project code when not using persistence)
extraVolumes:
  - name: mage-fs
    hostPath:
      path: /path/to/mage_project

# Persistent volume for project storage (replaces hostPath when enabled)
persistence:
  enabled: false
  storageClassName: storage-class-name
  size: 5Gi
  # csi:
  #   driver: efs.csi.aws.com
  #   volumeHandle: fs-0123456789

# ------------------------------------------------------------------------------
# Environment and configuration
# ------------------------------------------------------------------------------

# Environment variables injected into the Mage container (key-value pairs)
config: {}

# Name of an existing Secret to use for environment variables (overrides secrets if both set)
existingSecret: ""

# Secrets to create and inject as environment variables (prefer a secret manager in production)
secrets: {}

# Additional environment variables (supports valueFrom for field refs, etc.)
extraEnvs:
  - name: KUBE_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace

# CronJob for cleaning up old pipeline runs and logs
cleanupJob:
  enabled: false
  clean_variable_cli_args: ""
  clean_log_cli_args: ""
  schedule_cron: "0 * * * *"  # Runs every hour

# ------------------------------------------------------------------------------
# Mage Pro features (workspaces and Kubernetes executor)
# ------------------------------------------------------------------------------

# Default workspace configuration for Mage Pro workspaces.
# When enabled, creates a ConfigMap and mounts it at /etc/mage/workspace-config.yaml,
# and sets the WORKSPACE_DEFAULT_CONFIG_PATH environment variable to point to this file.
workspaceConfig:
  enabled: false
  # Whether to enforce the default config when it's conflicted with the user config
  enforce: false

  container_config:
    # Resource limits and requests for workspace containers
    resources:
      limits:
        cpu: "2"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"

  #   nodeSelector:
  #     node.kubernetes.io/instance-type: "m5.large"

  #   tolerations:
  #     - key: "dedicated"
  #       operator: "Equal"
  #       value: "mage"
  #       effect: "NoSchedule"
  # lifecycle_config:
  #   post_start:
  #     command: echo "Hello World"
  # service_account_name: workspace_config


# Default Kubernetes executor configuration for pipeline blocks.
# When enabled, creates a ConfigMap and mounts it at /etc/mage/k8s-executor-config.yaml,
# and sets the K8S_DEFAULT_CONFIG_PATH environment variable to point to this file.
k8sExecutorConfig:
  enabled: false
  # Whether to enforce the default config when it's conflicted with the user config
  enforce: false

  # Resource limits for executor pods
  resource_limits:
    cpu: "2000m"
    memory: "8Gi"

  # Resource requests for executor pods
  resource_requests:
    cpu: "1000m"
    memory: "4Gi"

  # Pod-level scheduling (nodeSelector, tolerations, affinity)
  # pod:
  #   nodeSelector:
  #     workload: "data"
  #   tolerations:
  #     - key: "workload"
  #       operator: "Equal"
  #       value: "data"
  #       effect: "NoSchedule"

# ------------------------------------------------------------------------------
# Log search (OpenSearch + Fluent Bit)
# ------------------------------------------------------------------------------

# When enabled, renders OPENSEARCH_* env vars into the Mage container, adds a
# Fluent Bit sidecar, and optionally creates an OpenSearch index setup Job.
logSearch:
  enabled: false

  opensearch:
    host: ""
    port: "9200"
    index: mage_logs
    # Authentication — credentials stored in a Kubernetes Secret.
    # Secret must contain keys: OPENSEARCH_USERNAME, OPENSEARCH_PASSWORD.
    auth:
      enabled: false
      existingSecret: ""
    # TLS — for encrypted connections to OpenSearch.
    # Secret must contain key: ca.crt (CA certificate).
    # Production: enable auth and tls together; keep both disabled for staging quick-start.
    tls:
      enabled: false
      existingSecret: ""
      verify: true    # set false to skip hostname verification (not recommended)

  # Existing PVC in the mage namespace that both the mageai container and the
  # Fluent Bit sidecar will mount at /home/src.
  persistence:
    # When enabled and existingClaim is empty, the chart creates a PVC for log
    # search project logs.
    enabled: false
    existingClaim: ""
    mountPath: /home/src
    # Set false when extraVolumeMounts already mounts the same project path.
    mountInMageContainer: true
    subPath: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  # Enables Mage Pro workspace pods to inherit log search settings and attach
  # their own Fluent Bit sidecar when the application creates workspace pods.
  workspace:
    enabled: true

  fluentBit:
    enabled: true
    image:
      repository: fluent/fluent-bit
      tag: latest
      pullPolicy: IfNotPresent
    # Optional names of existing ConfigMaps. When empty, this chart creates a
    # ConfigMap from config and parsers below.
    existingConfigMap: ""
    existingParsersConfigMap: ""
    config: |
      [SERVICE]
          Flush            5
          Daemon           Off
          Log_Level        info
          Parsers_File     /fluent-bit/etc/parsers.conf

      [INPUT]
          Name             tail
          Tag              mage.*
          Path             /home/src/mage_data/*/pipelines/*/.logs/*/*/*log
          Parser           mage_log
          Read_from_Head   On
          Refresh_Interval 10
          Skip_Long_Lines  On
          DB               /var/lib/fluent-bit/state.db

      [FILTER]
          Name             parser
          Match            mage.*
          Key_Name         _json_
          Parser           inner_json
          Reserve_Data     On

      [OUTPUT]
          Name               opensearch
          Match              *
          Host               ${OPENSEARCH_HOST}
          Port               ${OPENSEARCH_PORT}
          Index              ${OPENSEARCH_LOG_INDEX}
          Suppress_Type_Name On
          tls                ${OPENSEARCH_TLS}
          tls.verify         ${OPENSEARCH_VERIFY_CERTS}
          tls.ca_file        /etc/ssl/opensearch/ca.crt
          HTTP_User          ${OPENSEARCH_USERNAME}
          HTTP_Passwd        ${OPENSEARCH_PASSWORD}
          Id_Key             uuid
          Write_Operation    upsert
    parsers: |
      [PARSER]
          Name    mage_log
          Format  regex
          Regex   ^\S+\s+(?<_json_>\{.+\})$

      [PARSER]
          Name    inner_json
          Format  json
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # One-time Job that creates the mage_logs index in OpenSearch.
  # Safe to re-run; the hook skips the index when it already exists.
  setupJob:
    enabled: false
    image:
      repository: curlimages/curl
      tag: 8.8.0
      pullPolicy: IfNotPresent
    annotations: {}
    backoffLimit: 6
    ttlSecondsAfterFinished: 300
    extraEnv: []
    resources: {}
    mapping: |
      {
        "mappings": {
          "properties": {
            "pipeline_uuid": {"type": "keyword"},
            "pipeline_run_id": {"type": "integer"},
            "pipeline_schedule_id": {"type": "integer"},
            "block_uuid": {"type": "keyword"},
            "block_run_id": {"type": "integer"},
            "block_type": {"type": "keyword"},
            "level": {"type": "keyword"},
            "message": {
              "type": "text",
              "fields": {
                "keyword": {"type": "keyword", "ignore_above": 2048}
              }
            },
            "timestamp": {"type": "double"},
            "uuid": {"type": "keyword"},
            "file_type": {"type": "keyword"},
            "project_uuid": {"type": "keyword"},
            "workspace_uuid": {"type": "keyword"},
            "workspace_name": {"type": "keyword"},
            "repo_path_normalized": {"type": "keyword"},
            "hostname": {"type": "keyword"},
            "logged_at": {
              "type": "date",
              "format": "yyyy-MM-dd'T'HH:mm:ss"
            }
          }
        },
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": 0
        }
      }
