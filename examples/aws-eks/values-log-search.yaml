# values-log-search.yaml
# Shared Helm values for OpenSearch-backed log search on AWS EKS.
#
# Two deployment modes:
#
#   Bundled (quick-start / staging):
#     Add --set opensearch.enabled=true to the helm upgrade command.
#     OpenSearch is installed in the same release; no logSearch.opensearch.host needed.
#
#   External (production / managed cluster):
#     Leave opensearch.enabled=false (default) and set logSearch.opensearch.host
#     to point at the independently managed OpenSearch endpoint.
#     helm install opensearch opensearch/opensearch --values opensearch-values.yaml ...
#
# See log-search-deployment.md for the full helm upgrade command and deployment steps.
#
# The chart renders Fluent Bit config, parser config, and the index setup Job
# from logSearch.* values. Production credentials and TLS certificates should
# still be provided as Kubernetes Secrets.

logSearch:
  enabled: true
  opensearch:
    # Bundled mode  (opensearch.enabled=true):  host is auto-derived, leave empty.
    # External mode (opensearch.enabled=false): set host in your env overlay
    #   (e.g. values-log-search-staging.yaml) to the OpenSearch service DNS.
    host: ""
    port: "9200"
  fluentBit:
    enabled: true
  setupJob:
    enabled: true

# Clear chart defaults — logSearch.* now manages volumes, mounts, and the sidecar.
extraVolumes: []
extraVolumeMounts: []
extraContainers: []
