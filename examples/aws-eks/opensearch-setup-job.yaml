# opensearch-setup-job.yaml
# One-time Kubernetes Job that creates the mage_logs index in OpenSearch with
# the correct field mappings.  Run once after OpenSearch is healthy and before
# the first Mage pipeline run.
#
# Usage:
#   # 1. Create the ConfigMap from the setup script in the mage-pro repo
#   kubectl -n mage create configmap opensearch-setup-script \
#     --from-file=opensearch_setup.py=<path-to-mage-pro>/scripts/opensearch_setup.py
#
#   # 2. Apply the Job
#   kubectl apply -f examples/aws-eks/opensearch-setup-job.yaml
#
#   # 3. Watch completion
#   kubectl -n mage logs -f job/mage-logs-index-setup
#
# To re-run (e.g. after deleting the index): delete the Job first, then re-apply.
#   kubectl -n mage delete job mage-logs-index-setup
#   kubectl apply -f examples/aws-eks/opensearch-setup-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: mage-logs-index-setup
  namespace: mage
spec:
  ttlSecondsAfterFinished: 300    # auto-delete pod 5 min after completion
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install opensearch-py -q
              python /scripts/opensearch_setup.py
          env:
            - name: OPENSEARCH_HOST
              value: "opensearch-cluster-master.mage-search.svc.cluster.local"
            - name: OPENSEARCH_PORT
              value: "9200"
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
      volumes:
        - name: setup-script
          configMap:
            name: opensearch-setup-script
